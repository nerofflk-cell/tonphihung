<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Mod Skin | Giao Diện Vũ Trụ</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* Đặt lại lề và cài đặt font chữ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #05050f; /* Màu nền vũ trụ tối */
            font-family: 'Poppins', sans-serif;
        }

        /* Canvas chứa hiệu ứng ngôi sao */
        #space-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Khung nội dung chính */
        .container {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        /* Hiệu ứng kính mờ (Glassmorphism) cho thẻ Skin */
        .skin-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 50px 40px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37), 
                        0 0 20px rgba(138, 43, 226, 0.2);
            transition: transform 0.4s ease;
        }

        .skin-card:hover {
            transform: translateY(-10px);
            border: 1px solid rgba(0, 212, 255, 0.3);
            box-shadow: 0 15px 40px 0 rgba(0, 0, 0, 0.5), 
                        0 0 30px rgba(0, 212, 255, 0.3);
        }

        /* Tiêu đề */
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 10px;
            text-transform: uppercase;
            /* Hiệu ứng chữ Gradient */
            background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 0px 20px rgba(0, 210, 255, 0.3);
        }

        /* Đoạn văn mô tả */
        p {
            color: #b3b3cc;
            font-size: 1rem;
            margin-bottom: 40px;
            line-height: 1.5;
        }

        /* =========================================
           NÚT TẢI XUỐNG CỰC ĐẸP
           ========================================= */
        .btn-download {
            position: relative;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            padding: 16px 40px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(45deg, #ff007a, #7a00ff);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            overflow: hidden;
            z-index: 1;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 0, 122, 0.5), 
                        0 0 30px rgba(122, 0, 255, 0.5);
        }

        /* Hiệu ứng hover phát sáng mạnh hơn và phóng to */
        .btn-download:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(255, 0, 122, 0.8), 
                        0 0 50px rgba(122, 0, 255, 0.8),
                        0 0 80px rgba(0, 212, 255, 0.6);
            color: #fff;
        }

        /* Lớp giả tạo hiệu ứng quét ánh sáng ngang nút */
        .btn-download::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: left 0.5s ease;
            z-index: -1;
        }

        .btn-download:hover::before {
            left: 100%;
        }

        /* Icon nhỏ SVG trong nút */
        .btn-download svg {
            width: 24px;
            height: 24px;
            margin-right: 10px;
            fill: currentColor;
            animation: bounce 2s infinite;
        }

        /* Hiệu ứng nhún nhảy cho Icon tải xuống */
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-5px); }
            60% { transform: translateY(-3px); }
        }
    </style>
</head>
<body>

    <!-- Canvas tạo nền vũ trụ -->
    <canvas id="space-canvas"></canvas>

    <!-- Khung giao diện chính -->
    <div class="container">
        <div class="skin-card">
            <h1>Galaxy Skin</h1>
            <p>Trải nghiệm bộ mod skin độc quyền với hiệu ứng vũ trụ vô cực. Tối ưu hoá mượt mà, không giật lag. Khám phá ngay!</p>
            
            <a href="#" class="btn-download">
                <!-- Icon Download -->
                <svg viewBox="0 0 24 24">
                    <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
                </svg>
                TẢI XUỐNG
            </a>
        </div>
    </div>

    <!-- Script tạo hiệu ứng sao bay trong vũ trụ -->
    <script>
        const canvas = document.getElementById('space-canvas');
        const ctx = canvas.getContext('2d');

        let width, height, stars;

        // Cập nhật kích thước canvas theo màn hình
        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            stars = [];
            // Tạo 200 ngôi sao
            for (let i = 0; i < 200; i++) {
                stars.push(new Star());
            }
        }

        // Lớp Ngôi sao
        class Star {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2 + 0.5; // Kích thước ngẫu nhiên
                this.speedX = (Math.random() - 0.5) * 0.5; // Tốc độ trôi dạt
                this.speedY = Math.random() * 1.5 + 0.5;   // Tốc độ rơi từ trên xuống (cảm giác bay tới)
                this.opacity = Math.random();
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                // Nếu sao bay ra khỏi màn hình, reset lại vị trí
                if (this.y > height) {
                    this.y = 0;
                    this.x = Math.random() * width;
                }
                if (this.x > width) this.x = 0;
                if (this.x < 0) this.x = width;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.fill();
            }
        }

        // Vòng lặp animation
        function animate() {
            // Xóa nền mờ mờ để tạo vệt sao (trail effect)
            ctx.fillStyle = 'rgba(5, 5, 15, 0.2)';
            ctx.fillRect(0, 0, width, height);

            stars.forEach(star => {
                star.update();
                star.draw();
            });

            requestAnimationFrame(animate);
        }

        // Lắng nghe sự kiện thay đổi kích thước cửa sổ
        window.addEventListener('resize', initCanvas);

        // Chạy khởi tạo
        initCanvas();
        animate();
    </script>
</body>
</html>
